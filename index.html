<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are you my friend</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
}

/* SCREEN BASE */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 1s ease;
}

/* SCREEN 1 */
#screen1 {
    background: linear-gradient(135deg, #f8e7da, #f2d4c7);
}

.question {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #6e3b2c;
    margin-bottom: 40px;
    letter-spacing: 1px;
}

/* BUTTONS */
.buttons {
    position: relative;
    width: 100%;
    height: 200px;
}

button {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    position: absolute;
    transition: all 0.2s ease;
}

#yesBtn {
    background: #8b5e4a;
    color: #fff;
    left: 30%;
    top: 50%;
    transform: translate(-50%, -50%);
}

#noBtn {
    background: #c97b63;
    color: white;
    left: 70%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* FLOATING HEARTS */
.heart {
    position: absolute;
    font-size: 18px;
    animation: floatUp 4s ease forwards;
    opacity: 0.9;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-300px) scale(1.6); opacity: 0; }
}

/* SCREEN 2 */
#screen2 {
    background: linear-gradient(135deg, #f4e9dc, #e6d3b3);
    opacity: 0;
    pointer-events: none;
    padding: 20px;
    text-align: center;
}

/* VINTAGE CARD */
.card {
    max-width: 90%;
    background: rgba(255,255,255,0.6);
    border: 1px solid #b89b72;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0,0,0,0.15);
    color: #5b3a29;
    font-size: 1.1rem;
    line-height: 1.8;
    white-space: pre-line;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

/* TEXT FADE */
@keyframes fadeIn {
    to { opacity: 1; }
}

/* LETTER REVEAL EFFECT */
.line {
    opacity: 0;
    transform: translateY(10px);
    animation: reveal 1.5s ease forwards;
}

@keyframes reveal {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.side {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    font-size: 18px;
}

.left { left: 5px; }
.right { right: 5px; }

</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen">
    <div class="question">Are you my friend.</div>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">

    <div class="side left">❤️ 💕 💖 💞 💓 💘</div>
    <div class="side right">💘 💓 💞 💖 💕 ❤️</div>

    <div class="card" id="cardText"></div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const screen1 = document.getElementById("screen1");
const screen2 = document.getElementById("screen2");
const cardText = document.getElementById("cardText");

/* MOVE NO BUTTON */
function moveNo() {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
});

/* HEART ANIMATION */
function hearts() {
    for (let i = 0; i < 35; i++) {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = ["❤️","💖","💘","💕","💓"][Math.floor(Math.random()*5)];

        h.style.left = (window.innerWidth/2 + Math.random()*200 - 100) + "px";
        h.style.top = (window.innerHeight/2 + Math.random()*200 - 100) + "px";

        document.body.appendChild(h);
        setTimeout(()=>h.remove(),4000);
    }
}

/* TEXT CONTENT */
const text = `MORE THAN STRANGERS, LESS THAN LOVERS. WE ARE FRIENDS, BUT NOT JUST ANY FRIENDS.THE KIND OF FRIENDS WHO CAN BE SILENT TOGETHER WITHOUT FEELING AWKWARD. THE KIND OF FRIENDS WHO CAN LAUGH UNTIL OUR SIDES HURT AND THEN CRY ON EACH OTHER'S SHOULDERS WITHOUT JUDGMENT.

        ONLY TWO HEARTS CARING FOR EACH OTHER, WITHOUT THE PRESSURE OF LABELS OR EXPECTATIONS. A REFUGE FROM THE CHAOS OF THE WORLD. IN YOUR PRESENCE, I FEEL SEEN, HEARD, AND UNDERSTOOD IN A WAY THAT NO ONE ELSE CAN PROVIDE.

YOU ARE A BOOK I DIDN'T WRITE, BUT I READ IT A THOUSAND TIMES EVERYDAY. A STORY THAT NEVER GETS OLD, A CHAPTER I WANT TO REPEAT ENDLESSLY.

YOU  CREATED AN ENVIRONMENT THAT LEAVING FELT LIKE A SIN. A SAFE HAVEN WHERE I COULD BE MY TRUE SELF WITHOUT FEAR OF JUDGMENT.

WE BEGAN AS INDIVIDUALS WHO HAPPENED. OVER TIME, ALIGNMENT BECAME A HABIT. HABIT BECAME IDENTITY.IDENTITY BECAME LOVE. AND NOW, I CAN'T IMAGINE MY LIFE WITHOUT YOU IN IT.

THANK YOU MY DEAREAST FRIEND. YOU MADE ME FEEL HUMAN AGAIN. YOU MADE ME FEEL LOVED AGAIN. AND MOST IMPORTANTLY, YOU MADE ME FEEL HOPEFUL AGAIN.`;

/* TYPE REVEAL */
function revealText() {
    const lines = text.split("\n");
    lines.forEach((line, index) => {
        const div = document.createElement("div");
        div.className = "line";
        div.style.animationDelay = (index * 1) + "s";
        div.innerText = line;
        cardText.appendChild(div);
    });
}

/* YES CLICK */
yesBtn.onclick = () => {
    hearts();

    setTimeout(() => {
        screen1.style.opacity = "0";
        setTimeout(() => {
            screen1.style.display = "none";
            screen2.style.opacity = "1";
            screen2.style.pointerEvents = "all";
            revealText();
        }, 600);
    }, 1200);
};

</script>

</body>
</html>
